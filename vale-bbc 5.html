<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vale.bbc</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@300;400;600;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --red:#E8000D;--darkred:#9B0000;
  --white:#F5F5F5;--black:#0A0A0A;
  --grey:#1A1A1A;--grey2:#2A2A2A;--grey3:#3A3A3A;
  --text:#CCCCCC;
}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:var(--black);}
::-webkit-scrollbar-thumb{background:var(--red);}
html{scroll-behavior:smooth;}
body{background:var(--black);color:var(--white);font-family:'Oswald',sans-serif;min-height:100vh;}

header{
  position:sticky;top:0;z-index:100;
  background:rgba(10,10,10,0.97);
  border-bottom:3px solid var(--red);
  padding:0 24px;height:60px;
  display:flex;align-items:center;justify-content:space-between;
  backdrop-filter:blur(10px);
}
.logo{
  font-family:'Bebas Neue',cursive;font-size:36px;
  letter-spacing:4px;color:var(--white);text-decoration:none;
}
.logo span{color:var(--red);}
.admin-link{
  font-family:'Roboto Mono',monospace;font-size:11px;
  color:var(--grey3);text-decoration:none;
  padding:7px 14px;border:1px solid var(--grey3);
  letter-spacing:1px;transition:all 0.2s;
}
.admin-link:hover{color:var(--red);border-color:var(--red);}

.hero{
  background:var(--grey);border-bottom:2px solid var(--grey2);
  padding:50px 24px 40px;text-align:center;position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background:
    repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(232,0,13,0.03) 40px,rgba(232,0,13,0.03) 41px),
    repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(232,0,13,0.03) 40px,rgba(232,0,13,0.03) 41px);
}
.hero-title{
  font-family:'Bebas Neue',cursive;
  font-size:clamp(60px,12vw,120px);
  letter-spacing:8px;line-height:0.9;position:relative;
}
.hero-title .main{color:var(--white);}
.hero-title .accent{color:var(--red);text-shadow:0 0 60px rgba(232,0,13,0.5);}
.hero-sub{
  font-family:'Bebas Neue',cursive;
  font-size:clamp(18px,4vw,32px);
  letter-spacing:6px;
  color:var(--text);
  margin-top:14px;position:relative;
}
.hero-sub span{color:var(--red);}

.ticker{
  margin-top:24px;overflow:hidden;
  border-top:1px solid var(--grey3);border-bottom:1px solid var(--grey3);
  padding:10px 0;position:relative;
}
.ticker-inner{display:flex;gap:50px;width:max-content;animation:tickanim 22s linear infinite;}
.ticker-inner span{
  font-family:'Bebas Neue',cursive;font-size:17px;
  letter-spacing:3px;color:var(--red);white-space:nowrap;
}
@keyframes tickanim{from{transform:translateX(0)}to{transform:translateX(-50%)}}

.cat-bar{
  display:flex;border-bottom:2px solid var(--grey2);
  background:var(--grey);overflow-x:auto;padding:0 24px;
}
.cat-btn{
  font-family:'Bebas Neue',cursive;font-size:20px;letter-spacing:3px;
  background:transparent;border:none;border-bottom:3px solid transparent;
  color:var(--text);padding:16px 26px;cursor:pointer;
  margin-bottom:-2px;transition:all 0.2s;white-space:nowrap;
}
.cat-btn:hover{color:var(--white);}
.cat-btn.active{color:var(--red);border-bottom-color:var(--red);}

.main{max-width:680px;margin:0 auto;padding:30px 16px 80px;}

.meme-card{
  background:var(--grey);border:1px solid var(--grey2);
  margin-bottom:18px;animation:cardIn 0.35s ease both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

.card-header{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;border-bottom:1px solid var(--grey2);
}
.card-avatar{
  width:36px;height:36px;background:var(--red);
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',cursive;font-size:18px;color:var(--white);flex-shrink:0;
}
.card-meta{flex:1;}
.card-title{font-family:'Oswald',sans-serif;font-size:15px;font-weight:600;color:var(--white);letter-spacing:1px;}
.card-cat{font-family:'Roboto Mono',monospace;font-size:10px;color:var(--red);letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
.card-date{font-family:'Roboto Mono',monospace;font-size:10px;color:var(--grey3);}

.card-img{
  width:100%;display:block;max-height:600px;
  object-fit:contain;background:var(--black);cursor:pointer;transition:opacity 0.2s;
}
.card-img:hover{opacity:0.92;}

.card-actions{
  display:flex;align-items:center;gap:8px;
  padding:12px 16px;border-top:1px solid var(--grey2);
}
.like-btn{
  display:flex;align-items:center;gap:8px;
  background:transparent;border:1px solid var(--grey3);
  color:var(--text);font-family:'Oswald',sans-serif;
  font-size:14px;font-weight:600;letter-spacing:1px;
  padding:8px 18px;cursor:pointer;transition:all 0.2s;
}
.like-btn:hover,.like-btn.liked{background:var(--red);border-color:var(--red);color:var(--white);}
.comment-toggle{
  background:transparent;border:1px solid var(--grey3);
  color:var(--text);font-family:'Oswald',sans-serif;
  font-size:14px;font-weight:600;letter-spacing:1px;
  padding:8px 18px;cursor:pointer;transition:all 0.2s;
}
.comment-toggle:hover{border-color:var(--white);color:var(--white);}
.card-cat-tag{
  margin-left:auto;font-family:'Roboto Mono',monospace;
  font-size:10px;color:var(--grey3);letter-spacing:1px;
}

.comments-box{border-top:1px solid var(--grey2);padding:16px;display:none;}
.comments-box.open{display:block;}
.comment-input-row{display:flex;gap:8px;margin-bottom:16px;}
.comment-input{
  flex:1;background:var(--black);border:1px solid var(--grey3);
  color:var(--white);font-family:'Oswald',sans-serif;font-size:14px;
  padding:10px 14px;outline:none;transition:border-color 0.2s;
}
.comment-input:focus{border-color:var(--red);}
.comment-send{
  background:var(--red);border:none;color:var(--white);
  font-family:'Bebas Neue',cursive;font-size:18px;letter-spacing:2px;
  padding:10px 20px;cursor:pointer;transition:background 0.2s;
}
.comment-send:hover{background:var(--darkred);}
.comment-list{display:flex;flex-direction:column;gap:8px;}
.comment-item{background:var(--black);border-left:3px solid var(--red);padding:10px 14px;}
.comment-author{font-family:'Roboto Mono',monospace;font-size:10px;color:var(--red);letter-spacing:2px;margin-bottom:4px;text-transform:uppercase;}
.comment-text{font-family:'Oswald',sans-serif;font-size:14px;color:var(--text);font-weight:300;}
.no-comments{font-family:'Roboto Mono',monospace;font-size:11px;color:var(--grey3);text-align:center;padding:12px;letter-spacing:2px;}

.empty-state{text-align:center;padding:80px 20px;}
.empty-state .big{font-family:'Bebas Neue',cursive;font-size:80px;color:var(--grey2);letter-spacing:6px;display:block;}
.empty-state p{font-family:'Roboto Mono',monospace;font-size:11px;color:var(--grey3);letter-spacing:3px;margin-top:12px;}

.load-more{
  display:none;width:100%;background:transparent;
  border:2px solid var(--grey3);color:var(--text);
  font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:4px;
  padding:18px;cursor:pointer;margin-top:8px;transition:all 0.2s;
}
.load-more:hover{border-color:var(--red);color:var(--red);}

.lightbox{
  position:fixed;inset:0;background:rgba(0,0,0,0.96);z-index:1000;
  display:none;align-items:center;justify-content:center;
}
.lightbox.open{display:flex;}
.lightbox img{max-width:90vw;max-height:90vh;object-fit:contain;}
.lightbox-close{
  position:fixed;top:20px;right:24px;
  font-family:'Bebas Neue',cursive;font-size:30px;
  color:var(--white);cursor:pointer;letter-spacing:2px;
}
.lightbox-close:hover{color:var(--red);}

.fab{
  position:fixed;bottom:28px;right:28px;z-index:50;
  background:var(--red);border:none;color:var(--white);
  font-family:'Bebas Neue',cursive;font-size:19px;letter-spacing:3px;
  padding:15px 26px;cursor:pointer;
  box-shadow:0 8px 40px rgba(232,0,13,0.45);transition:all 0.2s;
}
.fab:hover{background:var(--darkred);transform:translateY(-2px);}
</style>
</head>
<body>

<header>
  <a href="#" class="logo">vale<span>.</span>bbc</a>
  <a href="vale-bbc-admin.html" class="admin-link">ADMIN</a>
</header>

<div class="hero">
  <div class="hero-title">
    <div class="main">VALE</div>
    <div class="accent">.BBC</div>
  </div>
  <div class="hero-sub"><span>La Fam</span> / nur hater</div>
  <div class="ticker">
    <div class="ticker-inner" id="ticker"></div>
  </div>
</div>

<div class="cat-bar">
  <button class="cat-btn active" onclick="filterCat('alle',this)">ALLE</button>
  <button class="cat-btn" onclick="filterCat('timgioh',this)">TIMGIOH</button>
  <button class="cat-btn" onclick="filterCat('drachenlord',this)">DRACHENLORD</button>
  <button class="cat-btn" onclick="filterCat('67',this)">67</button>
  <button class="cat-btn" onclick="filterCat('monte',this)">MONTE</button>
  <button class="cat-btn" onclick="filterCat('random',this)">RANDOM</button>
</div>

<div class="main">
  <div id="feed"></div>
  <button class="load-more" id="loadMoreBtn" onclick="loadMore()">MEHR LADEN</button>
</div>

<button class="fab" onclick="window.location.href='vale-bbc-admin.html'">+ MEME</button>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <div class="lightbox-close">SCHLIESSEN</div>
  <img id="lbImg" src="" alt=""/>
</div>

<script>
const STORAGE   = 'valebbc_v4';
const COMMENTS  = 'valebbc_comments_v4';
const LIKES     = 'valebbc_likes_v4';

const TICKERS = ['VALE.BBC','LA FAM','NUR HATER','TIMGIOH','DRACHENLORD','67','MONTE MAN YES','VALE.BBC','LA FAM','NUR HATER','TIMGIOH','DRACHENLORD','67','MONTE MAN YES'];

let currentCat = 'alle';
let visibleCount = 5;

// Ticker
const tickerEl = document.getElementById('ticker');
tickerEl.innerHTML = [...TICKERS,...TICKERS].map(t=>`<span>${t}</span>`).join('');

function getMemes(){
  try{return JSON.parse(localStorage.getItem(STORAGE))||[];}catch{return[];}
}
function getComments(){try{return JSON.parse(localStorage.getItem(COMMENTS))||{};}catch{return{};}}
function getLikes(){try{return JSON.parse(localStorage.getItem(LIKES))||{};}catch{return{};}}
function saveLikes(l){localStorage.setItem(LIKES,JSON.stringify(l));}
function saveComments(c){localStorage.setItem(COMMENTS,JSON.stringify(c));}

function filterCat(cat,btn){
  currentCat=cat; visibleCount=5;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderFeed();
}
function loadMore(){visibleCount+=5;renderFeed();}

function getFiltered(){
  const all=getMemes();
  return currentCat==='alle'?all:all.filter(m=>m.cat===currentCat);
}

function renderFeed(){
  const feed=document.getElementById('feed');
  const memes=getFiltered();
  const visible=memes.slice(0,visibleCount);
  const likes=getLikes();
  const comments=getComments();
  const btn=document.getElementById('loadMoreBtn');
  btn.style.display=memes.length>visibleCount?'block':'none';

  if(!visible.length){
    feed.innerHTML=`<div class="empty-state"><span class="big">LEER</span><p>NOCH KEINE MEMES</p></div>`;
    return;
  }

  feed.innerHTML=visible.map((m,i)=>{
    const lc=likes[m.id]||0;
    const liked=likes[m.id+'_l']||false;
    const mc=comments[m.id]||[];
    return `
    <div class="meme-card" style="animation-delay:${i*0.06}s" id="card-${m.id}">
      <div class="card-header">
        <div class="card-avatar">${m.cat.charAt(0).toUpperCase()}</div>
        <div class="card-meta">
          <div class="card-title">${m.title}</div>
          <div class="card-cat">${m.cat.toUpperCase()}</div>
        </div>
        <div class="card-date">${m.date}</div>
      </div>
      <img class="card-img" src="${m.src}" loading="lazy" onclick="openLb('${m.src}')" onerror="this.style.display='none'"/>
      <div class="card-actions">
        <button class="like-btn ${liked?'liked':''}" onclick="toggleLike('${m.id}',this)">
          ${liked?'▲':'△'} <span id="lc-${m.id}">${lc}</span>
        </button>
        <button class="comment-toggle" onclick="toggleCmt('${m.id}')">
          KOMMENTARE (<span id="cc-${m.id}">${mc.length}</span>)
        </button>
        <span class="card-cat-tag">${m.cat.toUpperCase()}</span>
      </div>
      <div class="comments-box" id="cb-${m.id}">
        <div class="comment-input-row">
          <input class="comment-input" id="ci-${m.id}" placeholder="Kommentar..." maxlength="200" onkeydown="if(event.key==='Enter')sendCmt('${m.id}')"/>
          <button class="comment-send" onclick="sendCmt('${m.id}')">SEND</button>
        </div>
        <div class="comment-list" id="cl-${m.id}">${renderCmts(mc)}</div>
      </div>
    </div>`;
  }).join('');
}

function renderCmts(arr){
  if(!arr.length) return `<div class="no-comments">NOCH KEINE KOMMENTARE</div>`;
  return arr.map(c=>`<div class="comment-item"><div class="comment-author">ANON · ${c.date}</div><div class="comment-text">${c.text}</div></div>`).join('');
}

function toggleLike(id,btn){
  const l=getLikes();
  const liked=l[id+'_l']||false;
  l[id+'_l']=!liked;
  l[id]=liked?Math.max(0,(l[id]||1)-1):(l[id]||0)+1;
  saveLikes(l);
  btn.className='like-btn'+(l[id+'_l']?' liked':'');
  btn.innerHTML=(l[id+'_l']?'▲':'△')+` <span id="lc-${id}">${l[id]||0}</span>`;
}

function toggleCmt(id){
  document.getElementById('cb-'+id).classList.toggle('open');
}

function sendCmt(id){
  const inp=document.getElementById('ci-'+id);
  const text=inp.value.trim();
  if(!text)return;
  const c=getComments();
  if(!c[id])c[id]=[];
  c[id].push({text,date:new Date().toLocaleDateString('de-DE')});
  saveComments(c);
  inp.value='';
  document.getElementById('cl-'+id).innerHTML=renderCmts(c[id]);
  document.getElementById('cc-'+id).textContent=c[id].length;
}

function openLb(src){
  document.getElementById('lbImg').src=src;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeLightbox(){
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow='';
}

renderFeed();

// live reload when admin adds memes
window.addEventListener('storage',()=>renderFeed());
</script>
</body>
</html>
