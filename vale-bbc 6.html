<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vale.bbc</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@300;400;600;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --red:#E8000D;--darkred:#9B0000;
  --white:#F5F5F5;--black:#0A0A0A;
  --grey:#1A1A1A;--grey2:#2A2A2A;--grey3:#3A3A3A;--text:#CCCCCC;
}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:var(--black);}
::-webkit-scrollbar-thumb{background:var(--red);}
html{scroll-behavior:smooth;}
body{background:var(--black);color:var(--white);font-family:'Oswald',sans-serif;min-height:100vh;}

header{
  position:sticky;top:0;z-index:100;
  background:rgba(10,10,10,0.97);border-bottom:3px solid var(--red);
  padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;
  backdrop-filter:blur(10px);
}
.logo{font-family:'Bebas Neue',cursive;font-size:36px;letter-spacing:4px;color:var(--white);text-decoration:none;}
.logo span{color:var(--red);}
.admin-link{font-family:'Roboto Mono',monospace;font-size:11px;color:var(--grey3);text-decoration:none;padding:7px 14px;border:1px solid var(--grey3);letter-spacing:1px;transition:all 0.2s;}
.admin-link:hover{color:var(--red);border-color:var(--red);}

.hero{background:var(--grey);border-bottom:2px solid var(--grey2);padding:50px 24px 40px;text-align:center;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(232,0,13,0.03) 40px,rgba(232,0,13,0.03) 41px),repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(232,0,13,0.03) 40px,rgba(232,0,13,0.03) 41px);}
.hero-title{font-family:'Bebas Neue',cursive;font-size:clamp(60px,12vw,120px);letter-spacing:8px;line-height:0.9;position:relative;}
.hero-title .main{color:var(--white);}
.hero-title .accent{color:var(--red);text-shadow:0 0 60px rgba(232,0,13,0.5);}
.hero-sub{font-family:'Bebas Neue',cursive;font-size:clamp(18px,4vw,32px);letter-spacing:6px;color:var(--text);margin-top:14px;position:relative;}
.hero-sub span{color:var(--red);}

.ticker{margin-top:24px;overflow:hidden;border-top:1px solid var(--grey3);border-bottom:1px solid var(--grey3);padding:10px 0;}
.ticker-inner{display:flex;gap:50px;width:max-content;animation:tickanim 22s linear infinite;}
.ticker-inner span{font-family:'Bebas Neue',cursive;font-size:17px;letter-spacing:3px;color:var(--red);white-space:nowrap;}
@keyframes tickanim{from{transform:translateX(0)}to{transform:translateX(-50%)}}

.cat-bar{display:flex;border-bottom:2px solid var(--grey2);background:var(--grey);overflow-x:auto;padding:0 24px;}
.cat-btn{font-family:'Bebas Neue',cursive;font-size:20px;letter-spacing:3px;background:transparent;border:none;border-bottom:3px solid transparent;color:var(--text);padding:16px 26px;cursor:pointer;margin-bottom:-2px;transition:all 0.2s;white-space:nowrap;}
.cat-btn:hover{color:var(--white);}
.cat-btn.active{color:var(--red);border-bottom-color:var(--red);}

.main{max-width:680px;margin:0 auto;padding:30px 16px 80px;}

.meme-card{background:var(--grey);border:1px solid var(--grey2);margin-bottom:18px;animation:cardIn 0.35s ease both;}
@keyframes cardIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

.card-header{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--grey2);}
.card-avatar{width:36px;height:36px;background:var(--red);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',cursive;font-size:18px;color:var(--white);flex-shrink:0;}
.card-meta{flex:1;}
.card-title{font-family:'Oswald',sans-serif;font-size:15px;font-weight:600;color:var(--white);letter-spacing:1px;}
.card-cat{font-family:'Roboto Mono',monospace;font-size:10px;color:var(--red);letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
.card-date{font-family:'Roboto Mono',monospace;font-size:10px;color:var(--grey3);}

.card-img{width:100%;display:block;max-height:600px;object-fit:contain;background:var(--black);cursor:pointer;transition:opacity 0.2s;}
.card-img:hover{opacity:0.92;}

.card-actions{display:flex;align-items:center;gap:8px;padding:12px 16px;border-top:1px solid var(--grey2);}
.like-btn{display:flex;align-items:center;gap:8px;background:transparent;border:1px solid var(--grey3);color:var(--text);font-family:'Oswald',sans-serif;font-size:14px;font-weight:600;letter-spacing:1px;padding:8px 18px;cursor:pointer;transition:all 0.2s;}
.like-btn:hover,.like-btn.liked{background:var(--red);border-color:var(--red);color:var(--white);}
.comment-toggle{background:transparent;border:1px solid var(--grey3);color:var(--text);font-family:'Oswald',sans-serif;font-size:14px;font-weight:600;letter-spacing:1px;padding:8px 18px;cursor:pointer;transition:all 0.2s;}
.comment-toggle:hover{border-color:var(--white);color:var(--white);}
.card-cat-tag{margin-left:auto;font-family:'Roboto Mono',monospace;font-size:10px;color:var(--grey3);letter-spacing:1px;}

.comments-box{border-top:1px solid var(--grey2);padding:16px;display:none;}
.comments-box.open{display:block;}
.comment-input-row{display:flex;gap:8px;margin-bottom:16px;}
.comment-input{flex:1;background:var(--black);border:1px solid var(--grey3);color:var(--white);font-family:'Oswald',sans-serif;font-size:14px;padding:10px 14px;outline:none;transition:border-color 0.2s;}
.comment-input:focus{border-color:var(--red);}
.comment-send{background:var(--red);border:none;color:var(--white);font-family:'Bebas Neue',cursive;font-size:18px;letter-spacing:2px;padding:10px 20px;cursor:pointer;transition:background 0.2s;}
.comment-send:hover{background:var(--darkred);}
.comment-list{display:flex;flex-direction:column;gap:8px;}
.comment-item{background:var(--black);border-left:3px solid var(--red);padding:10px 14px;}
.comment-author{font-family:'Roboto Mono',monospace;font-size:10px;color:var(--red);letter-spacing:2px;margin-bottom:4px;text-transform:uppercase;}
.comment-text{font-family:'Oswald',sans-serif;font-size:14px;color:var(--text);font-weight:300;}
.no-comments{font-family:'Roboto Mono',monospace;font-size:11px;color:var(--grey3);text-align:center;padding:12px;letter-spacing:2px;}

.empty-state{text-align:center;padding:80px 20px;}
.empty-state .big{font-family:'Bebas Neue',cursive;font-size:80px;color:var(--grey2);letter-spacing:6px;display:block;}
.empty-state p{font-family:'Roboto Mono',monospace;font-size:11px;color:var(--grey3);letter-spacing:3px;margin-top:12px;}

.loading{text-align:center;padding:60px;font-family:'Bebas Neue',cursive;font-size:30px;letter-spacing:4px;color:var(--grey3);}

.load-more{display:none;width:100%;background:transparent;border:2px solid var(--grey3);color:var(--text);font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:4px;padding:18px;cursor:pointer;margin-top:8px;transition:all 0.2s;}
.load-more:hover{border-color:var(--red);color:var(--red);}

.lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.96);z-index:1000;display:none;align-items:center;justify-content:center;}
.lightbox.open{display:flex;}
.lightbox img{max-width:90vw;max-height:90vh;object-fit:contain;}
.lightbox-close{position:fixed;top:20px;right:24px;font-family:'Bebas Neue',cursive;font-size:30px;color:var(--white);cursor:pointer;letter-spacing:2px;}
.lightbox-close:hover{color:var(--red);}

.fab{position:fixed;bottom:28px;right:28px;z-index:50;background:var(--red);border:none;color:var(--white);font-family:'Bebas Neue',cursive;font-size:19px;letter-spacing:3px;padding:15px 26px;cursor:pointer;box-shadow:0 8px 40px rgba(232,0,13,0.45);transition:all 0.2s;}
.fab:hover{background:var(--darkred);transform:translateY(-2px);}
</style>
</head>
<body>

<header>
  <a href="#" class="logo">vale<span>.</span>bbc</a>
  <a href="vale-bbc-admin.html" class="admin-link">ADMIN</a>
</header>

<div class="hero">
  <div class="hero-title">
    <div class="main">VALE</div>
    <div class="accent">.BBC</div>
  </div>
  <div class="hero-sub"><span>La Fam</span> / nur hater</div>
  <div class="ticker">
    <div class="ticker-inner" id="ticker"></div>
  </div>
</div>

<div class="cat-bar">
  <button class="cat-btn active" onclick="filterCat('alle',this)">ALLE</button>
  <button class="cat-btn" onclick="filterCat('timgioh',this)">TIMGIOH</button>
  <button class="cat-btn" onclick="filterCat('drachenlord',this)">DRACHENLORD</button>
  <button class="cat-btn" onclick="filterCat('67',this)">67</button>
  <button class="cat-btn" onclick="filterCat('monte',this)">MONTE</button>
  <button class="cat-btn" onclick="filterCat('random',this)">RANDOM</button>
</div>

<div class="main">
  <div id="feed"><div class="loading">LADEN...</div></div>
  <button class="load-more" id="loadMoreBtn" onclick="loadMore()">MEHR LADEN</button>
</div>

<button class="fab" onclick="window.location.href='vale-bbc-admin.html'">+ MEME</button>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <div class="lightbox-close">SCHLIESSEN</div>
  <img id="lbImg" src="" alt=""/>
</div>

<script>
const SUPABASE_URL = 'https://iccpxespcaxzuxtsvwbj.supabase.co';
const SUPABASE_KEY = 'sb_publishable_PXmn9liA83JvM_nTkjIdLg_YT6-9pvW';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const TICKERS = ['VALE.BBC','LA FAM','NUR HATER','TIMGIOH','DRACHENLORD','67','MONTE MAN YES','VALE.BBC','LA FAM','NUR HATER','TIMGIOH','DRACHENLORD','67','MONTE MAN YES'];
const tickerEl = document.getElementById('ticker');
tickerEl.innerHTML = [...TICKERS,...TICKERS].map(t=>`<span>${t}</span>`).join('');

let currentCat = 'alle';
let offset = 0;
const LIMIT = 10;
let allMemes = [];

async function loadMemes(reset=false){
  if(reset){ offset=0; allMemes=[]; }
  let query = sb.from('memes').select('*').order('created_at',{ascending:false}).range(offset, offset+LIMIT-1);
  if(currentCat !== 'alle') query = query.eq('cat', currentCat);
  const {data, error} = await query;
  if(error){ console.error(error); return; }
  allMemes = reset ? data : [...allMemes, ...data];
  offset += data.length;
  document.getElementById('loadMoreBtn').style.display = data.length === LIMIT ? 'block':'none';
  renderFeed();
}

function filterCat(cat, btn){
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  loadMemes(true);
}

function loadMore(){ loadMemes(false); }

async function getLikeCount(memeId){
  const {count} = await sb.from('likes').select('*',{count:'exact',head:true}).eq('meme_id', memeId);
  return count||0;
}

async function getComments(memeId){
  const {data} = await sb.from('comments').select('*').eq('meme_id', memeId).order('created_at',{ascending:true});
  return data||[];
}

function renderFeed(){
  const feed = document.getElementById('feed');
  if(!allMemes.length){
    feed.innerHTML=`<div class="empty-state"><span class="big">LEER</span><p>NOCH KEINE MEMES</p></div>`;
    return;
  }
  feed.innerHTML = allMemes.map((m,i)=>`
    <div class="meme-card" style="animation-delay:${i*0.06}s" id="card-${m.id}">
      <div class="card-header">
        <div class="card-avatar">${m.cat.charAt(0).toUpperCase()}</div>
        <div class="card-meta">
          <div class="card-title">${m.title}</div>
          <div class="card-cat">${m.cat.toUpperCase()}</div>
        </div>
        <div class="card-date">${m.date}</div>
      </div>
      <img class="card-img" src="${m.src}" loading="lazy" onclick="openLb('${m.src}')" onerror="this.style.display='none'"/>
      <div class="card-actions">
        <button class="like-btn" onclick="toggleLike('${m.id}',this)" id="like-${m.id}">
          △ <span id="lc-${m.id}">0</span>
        </button>
        <button class="comment-toggle" onclick="toggleCmt('${m.id}')">
          KOMMENTARE (<span id="cc-${m.id}">0</span>)
        </button>
        <span class="card-cat-tag">${m.cat.toUpperCase()}</span>
      </div>
      <div class="comments-box" id="cb-${m.id}">
        <div class="comment-input-row">
          <input class="comment-input" id="ci-${m.id}" placeholder="Kommentar..." maxlength="200" onkeydown="if(event.key==='Enter')sendCmt('${m.id}')"/>
          <button class="comment-send" onclick="sendCmt('${m.id}')">SEND</button>
        </div>
        <div class="comment-list" id="cl-${m.id}"><div class="no-comments">LADEN...</div></div>
      </div>
    </div>`).join('');

  // Load counts async
  allMemes.forEach(m => {
    getLikeCount(m.id).then(c => {
      const el = document.getElementById('lc-'+m.id);
      if(el) el.textContent = c;
    });
  });
}

async function toggleLike(id, btn){
  const liked = btn.classList.contains('liked');
  if(liked){
    // Unlike - get user like and delete
    btn.classList.remove('liked');
    btn.innerHTML = `△ <span id="lc-${id}">${Math.max(0,parseInt(document.getElementById('lc-'+id).textContent)-1)}</span>`;
    await sb.from('likes').delete().eq('meme_id',id).limit(1);
  } else {
    btn.classList.add('liked');
    await sb.from('likes').insert({meme_id:id});
    const c = await getLikeCount(id);
    const el = document.getElementById('lc-'+id);
    if(el) el.textContent = c;
    btn.innerHTML = `▲ <span id="lc-${id}">${c}</span>`;
  }
}

async function toggleCmt(id){
  const box = document.getElementById('cb-'+id);
  box.classList.toggle('open');
  if(box.classList.contains('open')){
    const cmts = await getComments(id);
    document.getElementById('cl-'+id).innerHTML = renderCmts(cmts);
    document.getElementById('cc-'+id).textContent = cmts.length;
  }
}

function renderCmts(arr){
  if(!arr.length) return `<div class="no-comments">NOCH KEINE KOMMENTARE</div>`;
  return arr.map(c=>`<div class="comment-item"><div class="comment-author">ANON · ${c.date}</div><div class="comment-text">${c.text}</div></div>`).join('');
}

async function sendCmt(id){
  const inp = document.getElementById('ci-'+id);
  const text = inp.value.trim();
  if(!text) return;
  inp.value='';
  await sb.from('comments').insert({meme_id:id, text, date: new Date().toLocaleDateString('de-DE')});
  const cmts = await getComments(id);
  document.getElementById('cl-'+id).innerHTML = renderCmts(cmts);
  document.getElementById('cc-'+id).textContent = cmts.length;
}

function openLb(src){
  document.getElementById('lbImg').src=src;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeLightbox(){
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow='';
}

loadMemes(true);

// Realtime updates
sb.channel('memes').on('postgres_changes',{event:'INSERT',schema:'public',table:'memes'},()=>{
  loadMemes(true);
}).subscribe();
</script>
</body>
</html>
