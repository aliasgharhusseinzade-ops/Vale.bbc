<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vale.bbc — ADMIN</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@300;400;600;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --red:#E8000D;--darkred:#9B0000;--green:#00C853;
  --white:#F5F5F5;--black:#0A0A0A;
  --grey:#1A1A1A;--grey2:#2A2A2A;--grey3:#3A3A3A;--text:#CCCCCC;
}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:var(--black);}
::-webkit-scrollbar-thumb{background:var(--red);}
body{background:var(--black);color:var(--white);font-family:'Oswald',sans-serif;min-height:100vh;}

/* LOCK */
#lock{
  position:fixed;inset:0;z-index:999;background:var(--black);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
}
.lock-logo{
  font-family:'Bebas Neue',cursive;font-size:clamp(50px,10vw,90px);
  letter-spacing:6px;color:var(--white);text-align:center;line-height:0.9;
}
.lock-logo span{color:var(--red);}
.lock-sub{font-family:'Roboto Mono',monospace;font-size:11px;letter-spacing:4px;color:var(--grey3);}

.mode-switcher{display:flex;border:1px solid var(--grey3);}
.mode-btn{
  font-family:'Bebas Neue',cursive;font-size:20px;letter-spacing:3px;
  background:transparent;border:none;color:var(--text);
  padding:12px 30px;cursor:pointer;transition:all 0.2s;
}
.mode-btn.active{background:var(--red);color:var(--white);}

.pw-input{
  width:300px;background:var(--grey);border:1px solid var(--grey3);border-top:none;
  color:var(--white);font-family:'Roboto Mono',monospace;
  font-size:16px;letter-spacing:3px;padding:16px 20px;
  outline:none;text-align:center;transition:border-color 0.2s;
}
.pw-input:focus{border-color:var(--red);}

.pw-btn{
  width:300px;background:var(--red);border:none;color:var(--white);
  font-family:'Bebas Neue',cursive;font-size:24px;letter-spacing:4px;
  padding:15px;cursor:pointer;transition:background 0.2s;
}
.pw-btn:hover{background:var(--darkred);}

.pw-err{font-family:'Roboto Mono',monospace;font-size:11px;color:var(--red);letter-spacing:2px;display:none;}
.back{font-family:'Roboto Mono',monospace;font-size:11px;color:var(--grey3);text-decoration:none;letter-spacing:2px;transition:color 0.2s;}
.back:hover{color:var(--red);}

/* PANEL */
#panel{display:none;}

header{
  position:sticky;top:0;z-index:100;
  background:rgba(10,10,10,0.97);border-bottom:3px solid var(--red);
  padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;
  backdrop-filter:blur(10px);
}
.logo{font-family:'Bebas Neue',cursive;font-size:30px;letter-spacing:4px;color:var(--white);text-decoration:none;}
.logo span{color:var(--red);}
.mode-tag{font-family:'Roboto Mono',monospace;font-size:11px;letter-spacing:3px;padding:6px 14px;border:1px solid;}
.mode-tag.up{border-color:var(--green);color:var(--green);}
.mode-tag.del{border-color:var(--red);color:var(--red);}

.tabs{display:flex;background:var(--grey);border-bottom:2px solid var(--grey2);}
.tab{
  font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:3px;
  background:transparent;border:none;border-bottom:3px solid transparent;
  color:var(--text);padding:18px 30px;cursor:pointer;
  margin-bottom:-2px;transition:all 0.2s;
}
.tab.active{color:var(--red);border-bottom-color:var(--red);}
.tab:hover{color:var(--white);}

.main{max-width:760px;margin:0 auto;padding:30px 20px 60px;}

.sec-title{
  font-family:'Bebas Neue',cursive;font-size:30px;letter-spacing:4px;
  border-left:4px solid var(--red);padding-left:14px;margin-bottom:22px;
}

.box{background:var(--grey);border:1px solid var(--grey2);padding:28px;margin-bottom:24px;}

.field{margin-bottom:18px;}
.field label{
  display:block;font-family:'Roboto Mono',monospace;
  font-size:10px;letter-spacing:3px;text-transform:uppercase;
  color:var(--grey3);margin-bottom:8px;
}
.field input[type=text],.field select,.field input[type=url]{
  width:100%;background:var(--black);border:1px solid var(--grey3);
  color:var(--white);font-family:'Oswald',sans-serif;font-size:15px;
  padding:12px 16px;outline:none;transition:border-color 0.2s;
}
.field input:focus,.field select:focus{border-color:var(--red);}
.field select option{background:var(--black);}

.drop{
  border:2px dashed var(--grey3);padding:48px 20px;
  text-align:center;cursor:pointer;transition:all 0.2s;margin-bottom:10px;
}
.drop:hover,.drop.drag{border-color:var(--red);background:rgba(232,0,13,0.05);}
.drop input{display:none;}
.drop-label{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:3px;color:var(--grey3);display:block;margin-bottom:8px;}
.drop-sub{font-family:'Roboto Mono',monospace;font-size:10px;color:var(--grey3);letter-spacing:2px;}
.chosen{margin-top:10px;font-family:'Roboto Mono',monospace;font-size:11px;color:var(--green);letter-spacing:2px;display:none;}

.preview{width:100%;max-height:280px;object-fit:contain;background:var(--black);border:1px solid var(--grey3);display:none;margin-bottom:18px;}

.submit{
  width:100%;background:var(--green);border:none;color:var(--black);
  font-family:'Bebas Neue',cursive;font-size:24px;letter-spacing:4px;
  padding:17px;cursor:pointer;transition:all 0.2s;
}
.submit:hover{opacity:0.88;transform:translateY(-1px);}

.msg{font-family:'Roboto Mono',monospace;font-size:11px;letter-spacing:2px;padding:12px 16px;margin-top:12px;display:none;}
.msg.ok{background:rgba(0,200,83,0.1);border:1px solid var(--green);color:var(--green);}
.msg.err{background:rgba(232,0,13,0.1);border:1px solid var(--red);color:var(--red);}

.tab-content{display:none;}
.tab-content.active{display:block;}

/* MANAGE */
.meme-list{display:flex;flex-direction:column;gap:10px;}
.meme-row{
  display:flex;align-items:center;gap:14px;
  background:var(--grey);border:1px solid var(--grey2);padding:12px 16px;
}
.meme-row img{width:68px;height:68px;object-fit:cover;flex-shrink:0;background:var(--black);}
.meme-row-info{flex:1;min-width:0;}
.meme-row-title{font-family:'Oswald',sans-serif;font-size:15px;font-weight:600;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.meme-row-cat{font-family:'Roboto Mono',monospace;font-size:10px;color:var(--red);letter-spacing:2px;text-transform:uppercase;margin-top:3px;}
.meme-row-date{font-family:'Roboto Mono',monospace;font-size:9px;color:var(--grey3);margin-top:2px;}
.del-btn{
  background:var(--red);border:none;color:var(--white);
  font-family:'Bebas Neue',cursive;font-size:16px;letter-spacing:2px;
  padding:10px 18px;cursor:pointer;flex-shrink:0;transition:background 0.2s;
}
.del-btn:hover{background:var(--darkred);}
.no-del{font-family:'Roboto Mono',monospace;font-size:9px;color:var(--grey3);letter-spacing:1px;flex-shrink:0;}

.empty{text-align:center;padding:60px;font-family:'Roboto Mono',monospace;font-size:11px;color:var(--grey3);letter-spacing:3px;}
</style>
</head>
<body>

<!-- LOCK SCREEN -->
<div id="lock">
  <div class="lock-logo">vale<span>.</span>bbc<br>ADMIN</div>
  <div class="lock-sub">CODE EINGEBEN</div>

  <div class="mode-switcher">
    <button class="mode-btn active" onclick="setMode('up',this)">UPLOAD</button>
    <button class="mode-btn" onclick="setMode('del',this)">LOESCHEN</button>
  </div>

  <input class="pw-input" type="password" id="pwInput" placeholder="••••••••" onkeydown="if(event.key==='Enter')unlock()"/>
  <button class="pw-btn" onclick="unlock()">ZUGANG</button>
  <div class="pw-err" id="pwErr">FALSCHER CODE</div>
  <a href="vale-bbc.html" class="back">ZURUECK ZUR WEBSITE</a>
</div>

<!-- ADMIN PANEL -->
<div id="panel">
  <header>
    <a href="vale-bbc.html" class="logo">vale<span>.</span>bbc</a>
    <div class="mode-tag" id="modeTag">UPLOAD</div>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('upload',this)">HOCHLADEN</button>
    <button class="tab" onclick="switchTab('manage',this)">VERWALTEN</button>
  </div>

  <div class="main">

    <!-- UPLOAD -->
    <div class="tab-content active" id="tab-upload">
      <div class="sec-title">MEME HINZUFUEGEN</div>
      <div class="box">
        <div class="field">
          <label>Titel</label>
          <input type="text" id="mTitle" placeholder="z.B. MONTE MAN YES"/>
        </div>
        <div class="field">
          <label>Kategorie</label>
          <select id="mCat">
            <option value="timgioh">TIMGIOH</option>
            <option value="drachenlord">DRACHENLORD</option>
            <option value="67">67</option>
            <option value="monte">MONTE</option>
            <option value="random">RANDOM</option>
          </select>
        </div>
        <div class="field">
          <label>Bild hochladen</label>
          <div class="drop" id="dropZone" onclick="document.getElementById('fi').click()">
            <input type="file" id="fi" accept="image/*" onchange="onFile(this)"/>
            <span class="drop-label">BILD HIERHER ZIEHEN</span>
            <span class="drop-sub">ODER KLICKEN</span>
            <div class="chosen" id="chosen"></div>
          </div>
        </div>
        <div class="field">
          <label>Oder Bild-URL</label>
          <input type="url" id="mUrl" placeholder="https://..." oninput="onUrl(this)"/>
        </div>
        <img class="preview" id="prev"/>
        <button class="submit" onclick="doUpload()">MEME HOCHLADEN</button>
        <div class="msg" id="upMsg"></div>
      </div>
    </div>

    <!-- MANAGE -->
    <div class="tab-content" id="tab-manage">
      <div class="sec-title">MEMES VERWALTEN</div>
      <div class="meme-list" id="memeList"></div>
    </div>

  </div>
</div>

<script>
const STORAGE  = 'valebbc_v4';
const UP_CODE  = 'alialiali';
const DEL_CODE = 'alialialialiali';

let mode = 'up';
let canDel = false;
let fileData = null;

function setMode(m, btn){
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function unlock(){
  const pw = document.getElementById('pwInput').value;
  const err = document.getElementById('pwErr');

  if(mode==='up' && pw===UP_CODE){
    canDel=false; openPanel();
  } else if(mode==='del' && pw===DEL_CODE){
    canDel=true; openPanel();
  } else {
    err.style.display='block';
    setTimeout(()=>err.style.display='none',2500);
  }
}

function openPanel(){
  document.getElementById('lock').style.display='none';
  document.getElementById('panel').style.display='block';
  const tag=document.getElementById('modeTag');
  if(canDel){tag.textContent='LOESCHEN MODE';tag.className='mode-tag del';}
  else{tag.textContent='UPLOAD MODE';tag.className='mode-tag up';}
  renderManage();
}

function switchTab(tab,btn){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
  if(tab==='manage') renderManage();
}

// Drag Drop
const dz=document.getElementById('dropZone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{
  e.preventDefault();dz.classList.remove('drag');
  const f=e.dataTransfer.files[0];
  if(f&&f.type.startsWith('image/')) processFile(f);
});

function onFile(inp){if(inp.files[0]) processFile(inp.files[0]);}

function processFile(f){
  const r=new FileReader();
  r.onload=e=>{
    fileData=e.target.result;
    document.getElementById('mUrl').value='';
    const ch=document.getElementById('chosen');
    ch.style.display='block';ch.textContent='AUSGEWAEHLT: '+f.name;
    showPrev(fileData);
  };
  r.readAsDataURL(f);
}

function onUrl(inp){
  fileData=null;
  document.getElementById('chosen').style.display='none';
  document.getElementById('fi').value='';
  inp.value?showPrev(inp.value):hidePrev();
}

function showPrev(src){const p=document.getElementById('prev');p.src=src;p.style.display='block';}
function hidePrev(){const p=document.getElementById('prev');p.style.display='none';p.src='';}

function getMemes(){try{return JSON.parse(localStorage.getItem(STORAGE))||[];}catch{return[];}}
function saveMemes(m){localStorage.setItem(STORAGE,JSON.stringify(m));}

function showMsg(id,type,txt){
  const el=document.getElementById(id);
  el.className='msg '+type;el.textContent=txt;el.style.display='block';
  setTimeout(()=>el.style.display='none',3000);
}

function doUpload(){
  const title=document.getElementById('mTitle').value.trim();
  const cat=document.getElementById('mCat').value;
  const url=document.getElementById('mUrl').value.trim();
  const src=fileData||url;
  if(!title){showMsg('upMsg','err','TITEL FEHLT!');return;}
  if(!src){showMsg('upMsg','err','BILD AUSWAEHLEN ODER URL EINGEBEN!');return;}

  const memes=getMemes();
  memes.unshift({
    id:'u'+Date.now(),
    title:title.toUpperCase(),
    cat,src,
    date:new Date().toLocaleDateString('de-DE'),
    custom:true
  });
  saveMemes(memes);
  showMsg('upMsg','ok','MEME HOCHGELADEN!');

  document.getElementById('mTitle').value='';
  document.getElementById('mUrl').value='';
  document.getElementById('fi').value='';
  document.getElementById('chosen').style.display='none';
  hidePrev();fileData=null;
}

function renderManage(){
  const list=document.getElementById('memeList');
  const memes=getMemes();
  if(!memes.length){
    list.innerHTML=`<div class="empty">NOCH KEINE MEMES HOCHGELADEN</div>`;
    return;
  }
  list.innerHTML=memes.map(m=>`
    <div class="meme-row" id="row-${m.id}">
      <img src="${m.src}" alt="${m.title}" onerror="this.style.display='none'"/>
      <div class="meme-row-info">
        <div class="meme-row-title">${m.title}</div>
        <div class="meme-row-cat">${m.cat.toUpperCase()}</div>
        <div class="meme-row-date">${m.date}</div>
      </div>
      ${canDel && m.custom
        ? `<button class="del-btn" onclick="delMeme('${m.id}')">LOESCHEN</button>`
        : `<span class="no-del">${m.custom?'':'DEFAULT'}</span>`}
    </div>`).join('');
}

function delMeme(id){
  const memes=getMemes().filter(m=>m.id!==id);
  saveMemes(memes);
  const row=document.getElementById('row-'+id);
  if(row){
    row.style.transition='all 0.25s';
    row.style.opacity='0';row.style.transform='translateX(20px)';
    setTimeout(()=>renderManage(),280);
  }
}
</script>
</body>
</html>
