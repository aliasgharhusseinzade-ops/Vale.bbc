<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vale.bbc — ADMIN</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@300;400;600;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--red:#E8000D;--darkred:#9B0000;--green:#00C853;--white:#F5F5F5;--black:#0A0A0A;--grey:#1A1A1A;--grey2:#2A2A2A;--grey3:#3A3A3A;--text:#CCCCCC;}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:var(--black);}
::-webkit-scrollbar-thumb{background:var(--red);}
body{background:var(--black);color:var(--white);font-family:'Oswald',sans-serif;min-height:100vh;}

#lock{position:fixed;inset:0;z-index:999;background:var(--black);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;}
.lock-logo{font-family:'Bebas Neue',cursive;font-size:clamp(50px,10vw,90px);letter-spacing:6px;color:var(--white);text-align:center;line-height:0.9;}
.lock-logo span{color:var(--red);}
.lock-sub{font-family:'Roboto Mono',monospace;font-size:11px;letter-spacing:4px;color:var(--grey3);}
.mode-switcher{display:flex;border:1px solid var(--grey3);}
.mode-btn{font-family:'Bebas Neue',cursive;font-size:20px;letter-spacing:3px;background:transparent;border:none;color:var(--text);padding:12px 30px;cursor:pointer;transition:all 0.2s;}
.mode-btn.active{background:var(--red);color:var(--white);}
.pw-input{width:300px;background:var(--grey);border:1px solid var(--grey3);border-top:none;color:var(--white);font-family:'Roboto Mono',monospace;font-size:16px;letter-spacing:3px;padding:16px 20px;outline:none;text-align:center;transition:border-color 0.2s;}
.pw-input:focus{border-color:var(--red);}
.pw-btn{width:300px;background:var(--red);border:none;color:var(--white);font-family:'Bebas Neue',cursive;font-size:24px;letter-spacing:4px;padding:15px;cursor:pointer;transition:background 0.2s;}
.pw-btn:hover{background:var(--darkred);}
.pw-err{font-family:'Roboto Mono',monospace;font-size:11px;color:var(--red);letter-spacing:2px;display:none;}
.back{font-family:'Roboto Mono',monospace;font-size:11px;color:var(--grey3);text-decoration:none;letter-spacing:2px;transition:color 0.2s;}
.back:hover{color:var(--red);}

#panel{display:none;}
header{position:sticky;top:0;z-index:100;background:rgba(10,10,10,0.97);border-bottom:3px solid var(--red);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(10px);}
.logo{font-family:'Bebas Neue',cursive;font-size:30px;letter-spacing:4px;color:var(--white);text-decoration:none;}
.logo span{color:var(--red);}
.mode-tag{font-family:'Roboto Mono',monospace;font-size:11px;letter-spacing:3px;padding:6px 14px;border:1px solid;}
.mode-tag.up{border-color:var(--green);color:var(--green);}
.mode-tag.del{border-color:var(--red);color:var(--red);}

.tabs{display:flex;background:var(--grey);border-bottom:2px solid var(--grey2);}
.tab{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:3px;background:transparent;border:none;border-bottom:3px solid transparent;color:var(--text);padding:18px 30px;cursor:pointer;margin-bottom:-2px;transition:all 0.2s;}
.tab.active{color:var(--red);border-bottom-color:var(--red);}
.tab:hover{color:var(--white);}

.admin-main{max-width:760px;margin:0 auto;padding:30px 20px 60px;}
.sec-title{font-family:'Bebas Neue',cursive;font-size:30px;letter-spacing:4px;border-left:4px solid var(--red);padding-left:14px;margin-bottom:22px;}
.box{background:var(--grey);border:1px solid var(--grey2);padding:28px;margin-bottom:24px;}
.field{margin-bottom:18px;}
.field label{display:block;font-family:'Roboto Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--grey3);margin-bottom:8px;}
.field input[type=text],.field select{width:100%;background:var(--black);border:1px solid var(--grey3);color:var(--white);font-family:'Oswald',sans-serif;font-size:15px;padding:12px 16px;outline:none;transition:border-color 0.2s;}
.field input:focus,.field select:focus{border-color:var(--red);}
.field select option{background:var(--black);}

.drop{border:2px dashed var(--grey3);padding:48px 20px;text-align:center;cursor:pointer;transition:all 0.2s;margin-bottom:10px;}
.drop:hover,.drop.drag{border-color:var(--red);background:rgba(232,0,13,0.05);}
.drop input{display:none;}
.drop-label{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:3px;color:var(--grey3);display:block;margin-bottom:8px;}
.drop-sub{font-family:'Roboto Mono',monospace;font-size:10px;color:var(--grey3);letter-spacing:2px;}
.chosen{margin-top:10px;font-family:'Roboto Mono',monospace;font-size:11px;color:var(--green);letter-spacing:2px;display:none;}
.preview{width:100%;max-height:280px;object-fit:contain;background:var(--black);border:1px solid var(--grey3);display:none;margin-bottom:18px;}

.progress-bar{width:100%;height:4px;background:var(--grey3);margin-bottom:18px;display:none;}
.progress-fill{height:100%;background:var(--red);width:0%;transition:width 0.3s;}

.submit{width:100%;background:var(--green);border:none;color:var(--black);font-family:'Bebas Neue',cursive;font-size:24px;letter-spacing:4px;padding:17px;cursor:pointer;transition:all 0.2s;}
.submit:hover{opacity:0.88;}
.submit:disabled{opacity:0.5;cursor:not-allowed;}
.msg{font-family:'Roboto Mono',monospace;font-size:11px;letter-spacing:2px;padding:12px 16px;margin-top:12px;display:none;}
.msg.ok{background:rgba(0,200,83,0.1);border:1px solid var(--green);color:var(--green);}
.msg.err{background:rgba(232,0,13,0.1);border:1px solid var(--red);color:var(--red);}

.tab-content{display:none;}
.tab-content.active{display:block;}

.meme-list{display:flex;flex-direction:column;gap:10px;}
.meme-row{display:flex;align-items:center;gap:14px;background:var(--grey);border:1px solid var(--grey2);padding:12px 16px;}
.meme-row img{width:68px;height:68px;object-fit:cover;flex-shrink:0;background:var(--black);}
.meme-row-info{flex:1;min-width:0;}
.meme-row-title{font-family:'Oswald',sans-serif;font-size:15px;font-weight:600;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.meme-row-cat{font-family:'Roboto Mono',monospace;font-size:10px;color:var(--red);letter-spacing:2px;text-transform:uppercase;margin-top:3px;}
.meme-row-date{font-family:'Roboto Mono',monospace;font-size:9px;color:var(--grey3);margin-top:2px;}
.del-btn{background:var(--red);border:none;color:var(--white);font-family:'Bebas Neue',cursive;font-size:16px;letter-spacing:2px;padding:10px 18px;cursor:pointer;flex-shrink:0;transition:background 0.2s;}
.del-btn:hover{background:var(--darkred);}
.empty{text-align:center;padding:60px;font-family:'Roboto Mono',monospace;font-size:11px;color:var(--grey3);letter-spacing:3px;}
.loading-list{text-align:center;padding:40px;font-family:'Bebas Neue',cursive;font-size:24px;color:var(--grey3);letter-spacing:3px;}
</style>
</head>
<body>

<div id="lock">
  <div class="lock-logo">vale<span>.</span>bbc<br>ADMIN</div>
  <div class="lock-sub">CODE EINGEBEN</div>
  <div class="mode-switcher">
    <button class="mode-btn active" onclick="setMode('up',this)">UPLOAD</button>
    <button class="mode-btn" onclick="setMode('del',this)">LOESCHEN</button>
  </div>
  <input class="pw-input" type="password" id="pwInput" placeholder="••••••••" onkeydown="if(event.key==='Enter')unlock()"/>
  <button class="pw-btn" onclick="unlock()">ZUGANG</button>
  <div class="pw-err" id="pwErr">FALSCHER CODE</div>
  <a href="vale-bbc.html" class="back">ZURUECK ZUR WEBSITE</a>
</div>

<div id="panel">
  <header>
    <a href="vale-bbc.html" class="logo">vale<span>.</span>bbc</a>
    <div class="mode-tag" id="modeTag">UPLOAD</div>
  </header>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('upload',this)">HOCHLADEN</button>
    <button class="tab" onclick="switchTab('manage',this)">VERWALTEN</button>
  </div>
  <div class="admin-main">
    <div class="tab-content active" id="tab-upload">
      <div class="sec-title">MEME HINZUFUEGEN</div>
      <div class="box">
        <div class="field">
          <label>Titel</label>
          <input type="text" id="mTitle" placeholder="z.B. MONTE MAN YES"/>
        </div>
        <div class="field">
          <label>Kategorie</label>
          <select id="mCat">
            <option value="timgioh">TIMGIOH</option>
            <option value="drachenlord">DRACHENLORD</option>
            <option value="67">67</option>
            <option value="monte">MONTE</option>
            <option value="random">RANDOM</option>
          </select>
        </div>
        <div class="field">
          <label>Bild hochladen (von Handy oder PC)</label>
          <div class="drop" id="dropZone" onclick="document.getElementById('fi').click()">
            <input type="file" id="fi" accept="image/*" onchange="onFile(this)"/>
            <span class="drop-label">BILD AUSWAEHLEN</span>
            <span class="drop-sub">KLICKEN ZUM AUSWAEHLEN — HANDY & PC</span>
            <div class="chosen" id="chosen"></div>
          </div>
        </div>
        <img class="preview" id="prev"/>
        <div class="progress-bar" id="progressBar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <button class="submit" id="submitBtn" onclick="doUpload()">MEME HOCHLADEN</button>
        <div class="msg" id="upMsg"></div>
      </div>
    </div>
    <div class="tab-content" id="tab-manage">
      <div class="sec-title">MEMES VERWALTEN</div>
      <div class="meme-list" id="memeList"><div class="loading-list">LADEN...</div></div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://iccpxespcaxzuxtsvwbj.supabase.co';
const SUPABASE_KEY = 'sb_publishable_PXmn9liA83JvM_nTkjIdLg_YT6-9pvW';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const BUCKET = 'Vale';

const UP_CODE  = 'alialiali';
const DEL_CODE = 'alialialialiali';

let mode = 'up';
let canDel = false;
let selFile = null;

function setMode(m, btn){
  mode=m;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function unlock(){
  const pw=document.getElementById('pwInput').value;
  if(mode==='up'&&pw===UP_CODE){canDel=false;openPanel();}
  else if(mode==='del'&&pw===DEL_CODE){canDel=true;openPanel();}
  else{
    const e=document.getElementById('pwErr');
    e.style.display='block';
    setTimeout(()=>e.style.display='none',2500);
  }
}

function openPanel(){
  document.getElementById('lock').style.display='none';
  document.getElementById('panel').style.display='block';
  const tag=document.getElementById('modeTag');
  if(canDel){tag.textContent='LOESCHEN MODE';tag.className='mode-tag del';}
  else{tag.textContent='UPLOAD MODE';tag.className='mode-tag up';}
}

function switchTab(tab,btn){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
  if(tab==='manage')renderManage();
}

// Drag & Drop
const dz=document.getElementById('dropZone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{
  e.preventDefault();dz.classList.remove('drag');
  const f=e.dataTransfer.files[0];
  if(f&&f.type.startsWith('image/'))setFile(f);
});

function onFile(inp){if(inp.files[0])setFile(inp.files[0]);}

function setFile(f){
  selFile=f;
  const ch=document.getElementById('chosen');
  ch.style.display='block';ch.textContent='AUSGEWAEHLT: '+f.name;
  const prev=document.getElementById('prev');
  prev.src=URL.createObjectURL(f);prev.style.display='block';
}

function showMsg(id,type,txt){
  const el=document.getElementById(id);
  el.className='msg '+type;el.textContent=txt;el.style.display='block';
  if(type==='ok')setTimeout(()=>el.style.display='none',4000);
}

async function doUpload(){
  const title=document.getElementById('mTitle').value.trim();
  const cat=document.getElementById('mCat').value;
  if(!title){showMsg('upMsg','err','TITEL FEHLT!');return;}
  if(!selFile){showMsg('upMsg','err','BILD AUSWAEHLEN!');return;}

  const btn=document.getElementById('submitBtn');
  btn.disabled=true;btn.textContent='WIRD HOCHGELADEN...';

  // Show progress
  const bar=document.getElementById('progressBar');
  const fill=document.getElementById('progressFill');
  bar.style.display='block';
  fill.style.width='30%';

  // Upload to Supabase Storage
  const fileName=Date.now()+'_'+selFile.name.replace(/\s/g,'_');
  const {data:storageData, error:storageError}=await sb.storage
    .from(BUCKET)
    .upload(fileName, selFile, {cacheControl:'3600', upsert:false});

  if(storageError){
    showMsg('upMsg','err','UPLOAD FEHLER: '+storageError.message);
    btn.disabled=false;btn.textContent='MEME HOCHLADEN';
    bar.style.display='none';
    return;
  }

  fill.style.width='70%';

  // Get public URL
  const {data:urlData}=sb.storage.from(BUCKET).getPublicUrl(fileName);
  const publicUrl=urlData.publicUrl;

  fill.style.width='90%';

  // Save to database
  const {error:dbError}=await sb.from('memes').insert({
    title:title.toUpperCase(),cat,
    src:publicUrl,
    date:new Date().toLocaleDateString('de-DE')
  });

  fill.style.width='100%';

  if(dbError){
    showMsg('upMsg','err','DB FEHLER: '+dbError.message);
  } else {
    showMsg('upMsg','ok','MEME HOCHGELADEN — JEDER SIEHT ES JETZT WELTWEIT!');
    document.getElementById('mTitle').value='';
    document.getElementById('fi').value='';
    document.getElementById('chosen').style.display='none';
    document.getElementById('prev').style.display='none';
    document.getElementById('prev').src='';
    selFile=null;
  }

  btn.disabled=false;btn.textContent='MEME HOCHLADEN';
  setTimeout(()=>{bar.style.display='none';fill.style.width='0%';},1000);
}

async function renderManage(){
  const list=document.getElementById('memeList');
  list.innerHTML='<div class="loading-list">LADEN...</div>';
  const {data,error}=await sb.from('memes').select('*').order('created_at',{ascending:false});
  if(error||!data||!data.length){list.innerHTML='<div class="empty">NOCH KEINE MEMES</div>';return;}
  list.innerHTML=data.map(m=>`
    <div class="meme-row" id="row-${m.id}">
      <img src="${m.src}" alt="${m.title}" onerror="this.style.display='none'"/>
      <div class="meme-row-info">
        <div class="meme-row-title">${m.title}</div>
        <div class="meme-row-cat">${m.cat.toUpperCase()}</div>
        <div class="meme-row-date">${m.date}</div>
      </div>
      ${canDel?`<button class="del-btn" onclick="delMeme('${m.id}','${m.src}')">LOESCHEN</button>`:''}
    </div>`).join('');
}

async function delMeme(id, src){
  // Extract filename from URL
  const parts=src.split('/');
  const fileName=parts[parts.length-1];

  await sb.storage.from(BUCKET).remove([fileName]);
  await sb.from('likes').delete().eq('meme_id',id);
  await sb.from('comments').delete().eq('meme_id',id);
  await sb.from('memes').delete().eq('id',id);

  const row=document.getElementById('row-'+id);
  if(row){
    row.style.transition='all 0.25s';
    row.style.opacity='0';row.style.transform='translateX(20px)';
    setTimeout(()=>renderManage(),280);
  }
}
</script>
</body>
</html>
